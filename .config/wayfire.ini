[core]
plugins = \
  alpha \
  animate \
  autostart \
  command \
  decoration \
  expo \
  fast-switcher \
  foreign-toplevel \
  grid \
  gtk-shell \
  idle \
  move \
  place \
  resize \
  scale \
  shortcuts-inhibit \
  switcher \
  vswitch \
  window-rules \
  wm-actions \
  wobbly \
  zoom

close_top_view = <super> KEY_Q | <alt> KEY_F4
preferred_decoration_mode = client
vwidth = 3
vheight = 3

[autostart]
autostart_wf_shell = false
desktop = lwrespawn /usr/bin/pcmanfm-pi
panel = lwrespawn /usr/bin/wf-panel-pi
outputs = kanshi
xdg_autostart = lxsession-xdg-autostart
portal = /usr/libexec/xdg-desktop-portal
idle = swayidle -w timeout 600 'wlopm --off *' resume 'wlopm --on *'
clipboard = ~/.local/bin/clipboard-sync

[command]
binding_terminal = <super> KEY_ENTER
command_terminal = x-terminal-emulator

binding_launcher = <super> KEY_SPACE
command_launcher = fuzzel

binding_logout = <super> KEY_ESC
command_logout = lxsession-logout

repeatable_binding_volume_up = KEY_VOLUMEUP
command_volume_up = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+

repeatable_binding_volume_down = KEY_VOLUMEDOWN
command_volume_down = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

binding_mute = KEY_MUTE
command_mute = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

[move]
activate = <super> BTN_LEFT

[resize]
activate = <super> BTN_RIGHT

[grid]
slot_l = <super> KEY_LEFT
slot_r = <super> KEY_RIGHT
slot_t = <super> KEY_UP
slot_b = <super> KEY_DOWN
restore = <super> KEY_DOWN | <super> KEY_KP0

[expo]
toggle = <super> KEY_E

[scale]
toggle = <super> KEY_TAB

[switcher]
next_view = <alt> KEY_TAB

[vswitch]
binding_left = <ctrl> <super> KEY_LEFT
binding_right = <ctrl> <super> KEY_RIGHT
binding_up = <ctrl> <super> KEY_UP
binding_down = <ctrl> <super> KEY_DOWN

[zoom]
modifier = <super>
